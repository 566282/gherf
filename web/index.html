<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="InvestPro - Smart Investment Platform">
  <meta name="theme-color" content="#D4AF37">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InvestPro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>InvestPro - Smart Investment Platform</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0E17;
      overflow: hidden;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0A0E17 0%, #111827 100%);
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #D4AF37, #F5D060);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-logo svg {
      width: 44px;
      height: 44px;
    }
    .loading-text {
      margin-top: 20px;
      font-family: 'Georgia', serif;
      font-size: 28px;
      font-weight: 700;
      color: #F0F4F8;
    }
    .loading-sub {
      margin-top: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #94A3B8;
    }
    .loading-bar {
      margin-top: 30px;
      width: 120px;
      height: 3px;
      background: #1E293B;
      border-radius: 3px;
      overflow: hidden;
    }
    .loading-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #F5D060);
      border-radius: 3px;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
        <polyline points="16 7 22 7 22 13"></polyline>
      </svg>
    </div>
    <div class="loading-text">InvestPro</div>
    <div class="loading-sub">Smart Investment Platform</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
